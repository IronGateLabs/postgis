# Pre-commit hooks for PostGIS code quality
# Install: pip install pre-commit && pre-commit install
# Bypass:  git commit --no-verify
# See: https://pre-commit.com

repos:
  # codespell: catch typos before they reach CI
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: ['--ignore-words=.codespell.ignore']
        exclude: '^(deps/|extensions/.*/sql/|doc/html/|doc/po/|autom4te\.cache/|build-aux/|configure$|aclocal\.m4$|macros/libtool\.m4$)'

  # merge conflict markers
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict

  # NOTE on clang-format: The upstream PostGIS codebase has many
  # pre-existing formatting variations. Do NOT use a clang-format
  # pre-commit hook on all files. Instead use: git clang-format
  # This formats only staged changes, matching the project convention
  # of separating style commits from logic commits.
  #
  # NOTE on shellcheck: Upstream CI/utility scripts have many
  # pre-existing shellcheck warnings. We only run shellcheck in CI
  # via the codespell workflow, not as a blocking pre-commit hook.
