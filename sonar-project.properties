sonar.projectKey=IronGateLabs_postgis
sonar.organization=irongatelabs

# Source directories
sonar.sources=liblwgeom,postgis,raster/rt_core,raster/rt_pg,topology,sfcgal,loader,libpgcommon

# Exclusions - test files, vendored deps, docs, generated files
sonar.exclusions=regress/**,deps/**,doc/**,**/cunit/**,**/test/**

# C-specific settings
sonar.c.file.suffixes=.c,.h
sonar.cfamily.build-wrapper-output=build-wrapper-output

# Encoding
sonar.sourceEncoding=UTF-8
