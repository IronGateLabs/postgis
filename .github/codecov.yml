coverage:
    status:
        project:
            default:
                threshold: 0.2%
        patch:
            default:
                threshold: 0.2%
            native-crs:
                flags:
                    - native-crs
                target: 90%

flags:
    native-crs:
        paths:
            - liblwgeom/lwgeom_eci.c
            - liblwgeom/lwgeom_transform.c
            - libpgcommon/lwgeom_transform.c
            - postgis/lwgeom_transform.c
            - postgis/lwgeom_functions_basic.c

comment: false
ignore:
  - "deps/wagyu/include/**/*" # Ignore wagyu library files
  - "deps/flatgeobuf/**/*" # Ignore FlatGeobuf library files
