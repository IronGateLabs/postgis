sonar.projectKey=IronGateLabs_postgis
sonar.organization=irongatelabs

# Source directories to analyze
sonar.sources=liblwgeom,postgis,raster/rt_core,raster/rt_pg,topology,sfcgal,loader,libpgcommon

# Exclude test files, vendored deps, generated docs, and CI scripts
sonar.exclusions=regress/**,deps/**,doc/**,**/cunit/**,**/test/**,extensions/**/sql/**

# C/C++ file suffixes
sonar.c.file.suffixes=.c,.h
sonar.cpp.file.suffixes=.cpp,.hpp

# Build wrapper output for C/C++ analysis
sonar.cfamily.build-wrapper-output=build-wrapper-output

sonar.sourceEncoding=UTF-8
